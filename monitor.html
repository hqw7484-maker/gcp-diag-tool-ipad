<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCS | 核心诊断中枢</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --bg-dark: #0a0b10;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1c2c 0%, #0a0b10 100%);
        }
        /* 背景流光动画 */
        body::before {
            content: "";
            position: absolute;
            width: 150%; height: 150%;
            background: conic-gradient(from 180deg at 50% 50%, var(--neon-blue) 0deg, transparent 90deg, var(--neon-blue) 180deg, transparent 270deg);
            animation: rotate 15s linear infinite;
            opacity: 0.05;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .glass-panel {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .status-pill {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .label { color: #636e72; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; }
        .value { font-size: 1.4rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

        .terminal-log {
            margin-top: 25px;
            background: #000;
            border-radius: 12px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #00d2ff;
            height: 80px;
            overflow-y: hidden;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        .cursor { animation: blink 1s infinite; border-left: 6px solid var(--neon-blue); margin-left: 5px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="header">
            <div style="font-size: 1.2rem; font-weight: 800;">CORE <span style="color: var(--neon-blue);">DX-2.0</span></div>
            <div class="status-badge"><span class="status-pill">● System Active</span></div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Location</div>
                <div class="value" id="loc">Detecting...</div>
            </div>
            <div class="stat-card">
                <div class="label">Tunnel Latency</div>
                <div class="value" style="color: var(--neon-blue);">24<span style="font-size: 0.8rem;">ms</span></div>
            </div>
            <div class="stat-card">
                <div class="label">Core Load</div>
                <div class="value" id="cpu">0.12%</div>
            </div>
            <div class="stat-card">
                <div class="label">Uptime</div>
                <div class="value" id="timer">00:00:00</div>
            </div>
        </div>

        <div class="terminal-log">
            > INITIALIZING XRAY CORE... [DONE]<br>
            > TUNNEL ESTABLISHED AT ATLANTA EDGE...<br>
            > <span style="color: #fff;">READY FOR INCOMING TRAFFIC</span><span class="cursor"></span>
        </div>
    </div>

    <script>
        // 模拟位置检测
        document.getElementById('loc').innerText = "Atlanta (GCP)";
        
        // 动态计时器
        let sec = 0;
        setInterval(() => {
            sec++;
            let h = Math.floor(sec / 3600).toString().padStart(2, '0');
            let m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
            let s = (sec % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }, 1000);

        // 模拟CPU波动
        setInterval(() => {
            document.getElementById('cpu').innerText = (Math.random() * 0.5 + 0.1).toFixed(2) + "%";
        }, 3000);
    </script>
</body>
</html>
